stages:
  - build
  - publish

# ── Linux Build ──────────────────────────────────────────────
build-linux:
  stage: build
  image: electronuserland/builder:20
  script:
    - npm ci
    - npm run build
    - npx electron-builder --linux --publish never
  artifacts:
    paths:
      - release/*.AppImage
      - release/*.deb
      - release/*.rpm
    expire_in: 30 days

# ── Publish to GitHub Release ────────────────────────────────
publish:
  stage: publish
  image: node:20
  needs:
    - build-linux
  before_script:
    - apt-get update -qq && apt-get install -y -qq gh > /dev/null
  script:
    - |
      echo "Uploading artifacts to GitHub Release..."
      for file in release/*.AppImage release/*.deb release/*.rpm; do
        if [ -f "$file" ]; then
          echo "Uploading $file"
          gh release upload "${CI_COMMIT_TAG}" "$file" \
            --repo davidgivondoh/imara-vision-agent \
            --clobber || echo "Warning: failed to upload $file"
        fi
      done
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  variables:
    GH_TOKEN: $GITHUB_TOKEN
