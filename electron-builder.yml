appId: com.imaravision.agent
productName: Imara Vision Agent
copyright: Copyright © 2026 Imara Vision (Precifarm AI Ltd)

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - src/desktop/ui/**/*
  - assets/**/*
  - package.json
  - "!node_modules/.cache"
  - "!**/*.ts"
  - "!**/*.map"
  - "!tests/**"
  - "!docs/**"
  - "!.git/**"
  - "!node_modules/typescript/**"
  - "!node_modules/vite/**"
  - "!node_modules/vitest/**"
  - "!node_modules/@types/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/electron-winstaller/**"
  - "!node_modules/app-builder-bin/**"
  - "!node_modules/7zip-bin/**"
  - "!node_modules/@esbuild/**"
  - "!node_modules/node-gyp/**"
  - "!node_modules/postject/**"
  - "!node_modules/@rollup/**"
  - "!node_modules/rollup/**"
  - "!node_modules/@vitest/**"
  - "!node_modules/png-to-ico/**"
  - "!node_modules/electron-publish/**"
  - "!**/*.md"
  - "!**/CHANGELOG*"
  - "!**/LICENSE"
  - "!**/README*"

# Include native modules
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/playwright/**"

# Skip native module rebuild (we use prebuilt binaries)
npmRebuild: false

# ── Windows ──────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: appx
      arch: [x64, arm64]
  icon: assets/icons/icon.ico
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icons/icon.ico
  uninstallerIcon: assets/icons/icon.ico
  installerHeaderIcon: assets/icons/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Imara Vision Agent

appx:
  identityName: PrecifarmAI.ImaraVisionAgent
  publisher: CN=Precifarm AI Ltd
  publisherDisplayName: Imara Vision
  applicationId: ImaraVisionAgent
  displayName: Imara Vision Agent
  languages: [en-US]
  backgroundColor: "#4f46e5"
  showNameOnTiles: true

# ── macOS ────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: assets/icons/icon.png
  category: public.app-category.education
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  title: Imara Vision Agent
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

# ── Linux ────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  icon: assets/icons
  category: Education
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
  desktop:
    entry: |
      [Desktop Entry]
      Name=Imara Vision Agent
      Comment=AI assistant for inclusive learning and independent living
      Categories=Education;Accessibility;Utility
      Keywords=AI;assistant;accessibility;learning;disability

# ── Publish (GitHub Releases) ────────────────────────────────
publish:
  provider: github
  owner: davidgivondoh
  repo: imara-vision-agent
  releaseType: release
