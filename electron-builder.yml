appId: com.imaravision.agent
productName: Imara Vision Agent
copyright: Copyright © 2026 Imara Vision (Precifarm AI Ltd)

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - src/desktop/ui/**/*
  - assets/**/*
  - package.json
  - "!node_modules/.cache"
  - "!**/*.ts"
  - "!**/*.map"
  - "!tests/**"
  - "!docs/**"
  - "!.git/**"

# Include native modules
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/playwright/**"

# Skip native module rebuild (we use prebuilt binaries)
npmRebuild: false

# ── Windows ──────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: assets/icons/icon.ico
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icons/icon.ico
  uninstallerIcon: assets/icons/icon.ico
  installerHeaderIcon: assets/icons/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Imara Vision Agent

# ── macOS ────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: assets/icons/icon.png
  category: public.app-category.education
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  title: Imara Vision Agent
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

# ── Linux ────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  icon: assets/icons
  category: Education
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
  desktop:
    entry: |
      [Desktop Entry]
      Name=Imara Vision Agent
      Comment=AI assistant for inclusive learning and independent living
      Categories=Education;Accessibility;Utility
      Keywords=AI;assistant;accessibility;learning;disability

# ── Publish (GitHub Releases) ────────────────────────────────
publish:
  provider: github
  owner: davidgivondoh
  repo: imara-vision-agent
  releaseType: release
